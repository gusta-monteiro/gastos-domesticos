<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Finanças Pessoais</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/auth.css">

</head>
<body>

<nav>
  <a href="landing.html" class="nav-logo">Finanças <span>Pessoais</span></a>
  <a href="landing.html" class="nav-back">← Voltar ao início</a>
</nav>

<div class="auth-wrap">
  <div class="auth-box">

    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Entrar</div>
      <div class="auth-tab" data-tab="signup">Cadastrar-se</div>
    </div>

    <!-- Login -->
    <div class="auth-form active" id="form-login">
      <div>
        <div class="auth-title">Bem-vindo de volta</div>
        <div class="auth-subtitle">Entre com sua conta para continuar</div>
      </div>
      <div id="msg-login" class="msg"></div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-submit" id="btn-login">Entrar</button>
    </div>

    <!-- Signup -->
    <div class="auth-form" id="form-signup">
      <div>
        <div class="auth-title">Criar conta</div>
        <div class="auth-subtitle">Totalmente gratuito, sem custos adicionais</div>
      </div>
      <div id="msg-signup" class="msg"></div>
      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="signup-name" placeholder="Seu nome" autocomplete="name">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="signup-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="signup-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <div class="field">
        <label>Confirmar senha</label>
        <input type="password" id="signup-confirm" placeholder="Repita a senha" autocomplete="new-password">
      </div>
      <button class="btn-submit" id="btn-signup">Criar conta</button>
    </div>

    <div class="auth-footer-note">
      Ao continuar, você concorda com os termos de uso da plataforma.
    </div>

  </div>
</div>

<footer>
  <p>Calculadora de Finanças Pessoais — seus dados são seus.</p>
</footer>
<script src="assets/js/auth.js"></script>
</body>
</html>
